components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Токен авторизации (статический или пользовательский)."

  schemas:
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
        message:
          type: string
        details:
          type: object

    RateLimitError:
      type: object
      required:
        - code
        - message
        - retry_after
      properties:
        code:
          type: integer
          example: 5016
        message:
          type: string
          example: rate_limit_exceeded
        retry_after:
          type: integer
          description: Секунд до сброса лимита.
        details:
          type: object
          properties:
            limit:
              type: integer
            count:
              type: integer
            excess:
              type: integer
            reset_at:
              type: integer
