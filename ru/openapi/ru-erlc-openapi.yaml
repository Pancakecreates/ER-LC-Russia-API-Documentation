openapi: 3.1.0
info:
  title: ER:LC Россия API V1 - Moscow RolePlay API ER:LC V1
  version: 1.0.0
servers:
  - url: https://api.erlcrussia.xyz/v1
    description: Moscow RolePlay API ER:LC V1
tags:
  - name: Moscow RolePlay API ER:LC V1
    description: Данные игрового сервера ER:LC и управление им.
paths:
  /moscowroleplay/erlc/server:
    get:
      tags:
        - Moscow RolePlay API ER:LC V1
      summary: Информация о Сервере ER:LC  
      description: >
        **ЭНДПОИНТ ОТКЛЮЧЕН** - Возвращает ошибку 500.
        
        Получение общей информации о сервере ER:LC (онлайн, название, статус и т.д.).
      deprecated: true
      security:
        - MRPAPIKey: []
      responses:
        '500':
          description: Эндпоинт отключен/устарел.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 5018
                message: 'Endpoint устарел. Используйте более новую версию API.'
  /moscowroleplay/erlc/server/players:
    get:
      tags:
        - Moscow RolePlay API ER:LC V1
      summary: Список Игроков На Сервере  
      description: |
        **ЭНДПОИНТ ОТКЛЮЧЕН** - Возвращает ошибку 500.
        
        Возвращает текущий список игроков на сервере ER:LC.
      deprecated: true
      security:
        - MRPAPIKey: []
      responses:
        '500':
          description: Эндпоинт отключен/устарел.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 5018
                message: 'Endpoint устарел. Используйте более новую версию API.'
  /moscowroleplay/erlc/server/joinlogs:
    get:
      tags:
        - Moscow RolePlay API ER:LC V1
      summary: Логи Входов/Выходов Игроков  
      description: |
        **ЭНДПОИНТ ОТКЛЮЧЕН** - Возвращает ошибку 500.
        
        Возвращает список логов входов и выходов игроков на сервер.
      deprecated: true
      security:
        - MRPAPIKey: []
      responses:
        '500':
          description: Эндпоинт отключен/устарел.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 5018
                message: 'Endpoint устарел. Используйте более новую версию API.'
  /moscowroleplay/erlc/server/queue:
    get:
      tags:
        - Moscow RolePlay API ER:LC V1
      summary: Очередь На Сервер  
      description: |
        **ЭНДПОИНТ ОТКЛЮЧЕН** - Возвращает ошибку 500.
        
        Возвращает информацию об очереди на сервер ER:LC.
      deprecated: true
      security:
        - MRPAPIKey: []
      responses:
        '500':
          description: Эндпоинт отключен/устарел.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 5018
                message: 'Endpoint устарел. Используйте более новую версию API.'
  /moscowroleplay/erlc/server/killlogs:
    get:
      tags:
        - Moscow RolePlay API ER:LC V1
      summary: Логи Убийств  
      description: |
        **ЭНДПОИНТ ОТКЛЮЧЕН** - Возвращает ошибку 500.
        
        Возвращает логи убийств на сервере ER:LC.
      deprecated: true
      security:
        - MRPAPIKey: []
      responses:
        '500':
          description: Эндпоинт отключен/устарел.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 5018
                message: 'Endpoint устарел. Используйте более новую версию API.'
  /moscowroleplay/erlc/server/commandlogs:
    get:
      tags:
        - Moscow RolePlay API ER:LC V1
      summary: Логи Команд  
      description: |
        **ЭНДПОИНТ ОТКЛЮЧЕН** - Возвращает ошибку 500.
        
        Возвращает логи выполненных команд на сервере.
      deprecated: true
      security:
        - MRPAPIKey: []
      responses:
        '500':
          description: Эндпоинт отключен/устарел.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 5018
                message: 'Endpoint устарел. Используйте более новую версию API.'
  /moscowroleplay/erlc/server/modcalls:
    get:
      tags:
        - Moscow RolePlay API ER:LC V1
      summary: Логи Вызовов Модераторов  
      description: |
        **ЭНДПОИНТ ОТКЛЮЧЕН** - Возвращает ошибку 500.
        
        Возвращает логи вызовов модераторов на сервере ER:LC.
      deprecated: true
      security:
        - MRPAPIKey: []
      responses:
        '500':
          description: Эндпоинт отключен/устарел.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 5018
                message: 'Endpoint устарел. Используйте более новую версию API.'
  /moscowroleplay/erlc/server/bans:
    get:
      tags:
        - Moscow RolePlay API ER:LC V1
      summary: Список Банов Сервера
      description: |
        Возвращает список активных банов на сервере ER:LC.
      security:
        - MRPAPIKey: []
      responses:
        '200':
          description: Список банов.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
                description: Объект где ключ - PlayerId, значение - имя игрока.
                example:
                  PlayerId: PlayerName
        '401':
          $ref: '#/components/responses/UnauthorizedMissingOrInvalidToken'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '400':
          $ref: '#/components/responses/PRCAPIError'
  /moscowroleplay/erlc/server/vehicles:
    get:
      tags:
        - Moscow RolePlay API ER:LC V1
      summary: Список Транспорта На Сервере  
      description: |
        **ЭНДПОИНТ ОТКЛЮЧЕН** - Возвращает ошибку 500.
        
        Возвращает список транспорта, находящегося на сервере ER:LC.
      deprecated: true
      security:
        - MRPAPIKey: []
      responses:
        '500':
          description: Эндпоинт отключен/устарел.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 5018
                message: 'Endpoint устарел. Используйте более новую версию API.'
  /moscowroleplay/erlc/server/staff:
    get:
      tags:
        - Moscow RolePlay API ER:LC V1
      summary: Список Персонала Сервера  
      description: |
        **ЭНДПОИНТ ОТКЛЮЧЕН** - Возвращает ошибку 500.
        
        Возвращает список членов персонала сервера ER:LC.
      deprecated: true
      security:
        - MRPAPIKey: []
      responses:
        '500':
          description: Эндпоинт отключен/устарел.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 5018
                message: 'Endpoint устарел. Используйте более новую версию API.'
  /moscowroleplay/erlc/server/command:
    post:
      tags:
        - Moscow RolePlay API ER:LC V1
      summary: Отправка Команды На Сервер ER:LC  
      description: >
        **ЭНДПОИНТ ОТКЛЮЧЕН** - Возвращает ошибку 500.
        
        Отправляет команду на выполнение на сервере ER:LC.


        Команды добавляются в глобальную очередь с ограничением на максимальное
        количество команд.


        **Примечание:** Этот эндпоинт **не подвержен** Rate Limiting (120 запросов/мин).
      deprecated: true
      security:
        - MRPAPIKey: []
      requestBody:
        required: true
        description: Объект с Текстом Команды.
        content:
          application/json:
            schema:
              type: object
              required:
                - command
              properties:
                command:
                  type: string
                  example: ':h Тест API'
      responses:
        '500':
          description: Эндпоинт отключен/устарел.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 5018
                message: 'Endpoint устарел. Используйте более новую версию API.'
components:
  securitySchemes:
    MRPAPIKey:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: |
        Стандартный API ключ для доступа к ER:LC эндпоинтам.

        Передается в заголовке `Authorization: Bearer <ключ>`.

        ОБЯЗАТЕЛЕН ДЛЯ ВСЕХ ER:LC ЭНДПОИНТОВ.
  responses:
    BadRequest:
      description: Неверный запрос.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedMissingOrInvalidToken:
      description: Ошибка аутентификации.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UnauthorizedError'
          examples:
            Missing Token:
              summary: Нет токена.
              value:
                code: 5007
                message: Missing Token
            Invalid Token:
              summary: Неверный или деактивированный токен.
              value:
                code: 5008
                message: Invalid Token
            Invalid Master Key:
              summary: Неверный мастер-ключ.
              value:
                code: 5006
                message: Invalid Master Key
    Forbidden:
      description: Доступ запрещён.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ForbiddenError'
          examples:
            Forbidden:
              summary: Нет прав доступа к эндпоинту.
              value:
                code: 5009
                message: Forbidden
            Api Version Forbidden:
              summary: Доступ к этой версии API запрещён.
              value:
                code: 5010
                message: Api Version Forbidden
            Query Param Forbidden:
              summary: Query-параметр запрещён.
              value:
                code: 5011
                message: Query Param Forbidden
    NotFound:
      description: Не найдено.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Discord Id Not Found:
              summary: Discord ID не найден.
              value:
                code: 5012
                message: Discord Id Not Found
            Token Not Found:
              summary: Токен не найден.
              value:
                code: 5013
                message: Token Not Found
    TooManyRequests:
      description: Превышено количество запросов (лимит 120/мин) или обнаружен спам (400+ лишних запросов).
      headers:
        X-RateLimit-Limit:
          description: Максимум запросов в минуту.
          schema:
            type: integer
            example: 120
        X-RateLimit-Remaining:
          description: Оставшееся количество запросов.
          schema:
            type: integer
            example: 0
        X-RateLimit-Reset:
          description: Unix timestamp (мс), когда лимит будет сброшен.
          schema:
            type: integer
            example: 1740339600000
        Retry-After:
          description: Секунд до сброса лимита.
          schema:
            type: integer
            example: 45
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RateLimitError'
          examples:
            Rate Limit Exceeded:
              summary: Превышение лимита 120 запросов/мин.
              value:
                code: 5016
                message: Rate Limit Exceeded
                retry_after: 45
                details:
                  limit: 120
                  count: 125
                  excess: 5
                  reset_at: 1740339600000
    PRCAPIError:
      description: Ошибка от внешнего PRC API (ER:LC).
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
                example: 5019
              message:
                type: string
                example: Prc Api Error
              prc_code:
                type: integer
                description: Код ошибки PRC API.
              prc_message:
                type: string
                description: Описание ошибки.
          examples:
            Expired Server Key:
              summary: Server-Key недействителен или истёк.
              value:
                code: 5019
                message: Prc Api Error
                prc_code: 2002
                prc_message: Invalid or expired server-key
            Server Offline:
              summary: Сервер офлайн (нет игроков).
              value:
                code: 5019
                message: Prc Api Error
                prc_code: 3002
                prc_message: Server is offline (no players)
            Module Outdated:
              summary: Модуль на сервере устарел.
              value:
                code: 5019
                message: Prc Api Error
                prc_code: 9999
                prc_message: In-game server module is out of date
    InternalServerError:
      description: Внутренняя ошибка сервера.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Server Error:
              summary: Ошибка внешнего ER:LC API.
              value:
                code: 5018
                message: Server Error
  schemas:
    ErrorResponse:
      type: object
      description: Стандартный формат ошибки.
      required:
        - code
        - message
      properties:
        code:
          type: integer
          description: Код ошибки API.
          example: 5007
        message:
          type: string
          description: Сообщение/идентификатор ошибки.
          example: Missing Token
    UnauthorizedError:
      type: object
      description: Ошибка аутентификации (отсутствует или неверный токен).
      required:
        - code
        - message
      properties:
        code:
          type: integer
          example: 5007
        message:
          type: string
          example: Missing Token
    ForbiddenError:
      type: object
      description: Ошибка доступа (запрещено).
      required:
        - code
        - message
      properties:
        code:
          type: integer
          example: 5009
        message:
          type: string
          example: Forbidden
    RateLimitError:
      type: object
      description: Ошибка превышения лимита запросов (120/мин). Возвращает details с информацией о счётчике.
      required:
        - code
        - message
        - retry_after
        - details
      properties:
        code:
          type: integer
          example: 5016
        message:
          type: string
          example: Rate Limit Exceeded
        retry_after:
          type: integer
          description: Время до сброса лимита в секундах.
          example: 45
        details:
          type: object
          properties:
            limit:
              type: integer
              description: Лимит запросов в минуту.
              example: 120
            count:
              type: integer
              description: Текущее количество запросов.
              example: 125
            excess:
              type: integer
              description: Количество лишних запросов (сверх лимита).
              example: 5
            reset_at:
              type: integer
              description: Unix timestamp (мс) сброса лимита.
              example: 1740339600000
