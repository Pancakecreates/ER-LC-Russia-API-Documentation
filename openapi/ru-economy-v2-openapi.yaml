        - `info` - информация о бизнесе (требует businessId или businessName).
        - `balance` - баланс бизнеса (требует businessId).
        - `employees` - сотрудники бизнеса (требует businessId, page, limit).
        - `store` - товары бизнеса (требует businessName).
        - `transfers` - переводы бизнеса (требует businessId, page, limit).
