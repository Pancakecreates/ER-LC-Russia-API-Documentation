components:
  securitySchemes:
    MRPAPIKey:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: |
        API ключ для доступа к эндпоинтам Гражданских Операций.

        Передается в заголовке `Authorization: Bearer <ключ>`.

        ОБЯЗАТЕЛЕН ДЛЯ ВСЕХ ЭНДПОИНТОВ ГРАЖДАНСКИХ ОПЕРАЦИЙ (кроме /health).
  responses:
    UnauthorizedMissingOrInvalidToken:
      description: Ошибка аутентификации.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UnauthorizedError'
          examples:
            missing_token:
              summary: Нет токена.
              value:
                code: 5007
                message: missing_token
            invalid_token:
              summary: Неверный или деактивированный токен.
              value:
                code: 5008
                message: invalid_token
            invalid_master_key:
              summary: Неверный мастер-ключ.
              value:
                code: 5006
                message: invalid_master_key
    Forbidden:
      description: Доступ запрещён.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ForbiddenError'
          examples:
            forbidden:
              summary: Нет прав доступа к эндпоинту.
              value:
                code: 5009
                message: forbidden
            api_version_forbidden:
              summary: Доступ к этой версии API запрещён.
              value:
                code: 5010
                message: api_version_forbidden
            query_param_forbidden:
              summary: Query-параметр запрещён.
              value:
                code: 5011
                message: query_param_forbidden
    TooManyRequests:
      description: Превышено количество запросов.
      headers:
        X-RateLimit-Limit:
          description: Максимум запросов в минуту.
          schema:
            type: integer
            example: 60
        X-RateLimit-Remaining:
          description: Оставшееся количество запросов.
          schema:
            type: integer
            example: 0
        Retry-After:
          description: Секунд до сброса лимита.
          schema:
            type: integer
            example: 30
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RateLimitError'
          examples:
            rate_limit_exceeded:
              summary: Превышение лимита запросов.
              value:
                code: 5016
                message: rate_limit_exceeded
                bucket: "economy-global"
                retry_after: 30
    InternalServerError:
      description: Внутренняя ошибка сервера.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            server_error:
              summary: Ошибка API экономики.
              value:
                code: 5018
                message: server_error
  schemas:
    ErrorResponse:
      type: object
      description: Стандартный формат ошибки.
      required:
        - code
        - message
      properties:
        code:
          type: integer
          description: Код ошибки API.
          example: 5007
        message:
          type: string
          description: Сообщение/идентификатор ошибки.
          example: missing_token
    UnauthorizedError:
      type: object
      description: Ошибка аутентификации (отсутствует или неверный токен).
      required:
        - code
        - message
      properties:
        code:
          type: integer
          example: 5007
        message:
          type: string
          example: missing_token
    ForbiddenError:
      type: object
      description: Ошибка доступа (запрещено).
      required:
        - code
        - message
      properties:
        code:
          type: integer
          example: 5009
        message:
          type: string
          example: forbidden
    RateLimitError:
      type: object
      description: Ошибка превышения лимита запросов.
      required:
        - code
        - message
      properties:
        code:
          type: integer
          example: 5016
        message:
          type: string
          example: rate_limit_exceeded
        bucket:
          type: string
          description: Название бакета rate limit.
          example: "economy-global"
        retry_after:
          type: integer
          description: Время до сброса лимита в секундах.
          example: 30
    EconomyTransferRequest:
      type: object
      description: Запрос на перевод между пользователями (action=transfer).
      required:
        - fromUserId
        - toUserId
        - amount
      properties:
        fromUserId:
          type: string
          description: ID отправителя.
          example: "123456789"
        toUserId:
          type: string
          description: ID получателя.
          example: "987654321"
        amount:
          type: integer
          description: Сумма перевода.
          example: 1000
    EconomyUserAmountRequest:
      type: object
      description: Запрос с userId и amount (action=deposit, withdraw).
      required:
        - userId
        - amount
      properties:
        userId:
          type: string
          description: ID пользователя.
          example: "123456789"
        amount:
          type: integer
          description: Сумма операции.
          example: 5000
    EconomyUserTypeRequest:
      type: object
      description: Запрос с userId, amount и type (action=add, remove).
      required:
        - userId
        - amount
      properties:
        userId:
          type: string
          description: ID пользователя.
          example: "123456789"
        amount:
          type: integer
          description: Сумма операции.
          example: 1000
        type:
          type: string
          description: Тип баланса ('cash' или 'bank').
          enum: [cash, bank]
          default: cash
          example: cash
    EconomyUserOnlyRequest:
      type: object
      description: Запрос только с userId (action=reset).
      required:
        - userId
      properties:
        userId:
          type: string
          description: ID пользователя.
          example: "123456789"
    EconomyResetCooldownRequest:
      type: object
      description: Запрос на сброс кулдауна (action=resetCooldown).
      required:
        - userId
      properties:
        userId:
          type: string
          description: ID пользователя.
          example: "123456789"
        command:
          type: string
          description: Название команды для сброса (если не указано - сбрасывает все).
          example: "work"
    UsersAddItemRequest:
      type: object
      description: Запрос на добавление предмета в инвентарь (action=addItem).
      required:
        - userId
        - item
      properties:
        userId:
          type: string
          description: ID пользователя.
          example: "123456789"
        item:
          type: object
          description: Предмет для добавления.
          required:
            - name
          properties:
            name:
              type: string
              description: Название предмета.
              example: "Police Badge"
            amount:
              type: integer
              description: Количество.
              default: 1
              example: 1
            description:
              type: string
              description: Описание предмета.
              example: "Official police badge"
    UsersRemoveItemRequest:
      type: object
      description: Запрос на удаление предмета из инвентаря (action=removeItem).
      required:
        - userId
        - itemName
      properties:
        userId:
          type: string
          description: ID пользователя.
          example: "123456789"
        itemName:
          type: string
          description: Название предмета.
          example: "Coffee"
        amount:
          type: integer
          description: Количество.
          default: 1
          example: 2
    UsersClearInventoryRequest:
      type: object
      description: Запрос на очистку инвентаря (action=clearInventory).
      required:
        - userId
      properties:
        userId:
          type: string
          description: ID пользователя.
          example: "123456789"
    BusinessRequestRequest:
      type: object
      description: Запрос на создание заявки на бизнес (action=request).
      required:
        - userId
        - username
        - name
        - form
      properties:
        userId:
          type: string
          description: ID пользователя.
          example: "123456789"
        username:
          type: string
          description: Имя пользователя.
          example: "Player1"
        name:
          type: string
          description: Название бизнеса.
          example: "Moscow Motors"
        form:
          type: string
          description: Форма бизнеса.
          example: "ООО"
        channelId:
          type: string
          description: ID Discord канала для уведомлений.
          example: "1417184142227144877"
    BusinessApproveRequest:
      type: object
      description: Запрос на одобрение заявки на бизнес (action=approve).
      required:
        - requestId
        - approverId
      properties:
        requestId:
          type: string
          description: ID заявки.
          example: "req_123"
        approverId:
          type: string
          description: ID одобряющего.
          example: "987654321"
        ownerId:
          type: string
