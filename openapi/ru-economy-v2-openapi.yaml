      description: |
        Управление товарами магазина и покупка/продажа.

        Доступные действия:
        - `addItem` - добавить товар в магазин (требует item с name, price_buy, ...).
        - `removeItem` - удалить товар из магазина (требует itemName).
        - `buy` - купить товар у магазина (требует userId, itemName, quantity).
        - `sellToStore` - продать товар магазину (требует userId, itemName, quantity).
