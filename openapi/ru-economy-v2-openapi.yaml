openapi: 3.1.0
info:
  title: Moscow RolePlay API - CivOps Economy v2
  description: |
    Эндпоинты для управления экономикой и CivOps системой Moscow RolePlay.

    ## Что такое CivOps Economy API?

    CivOps Economy API предоставляет доступ к экономической системе сервера,
    включая управление пользователями, бизнесами, мафиями, правительством,
    магазином, рекламой и системными настройками.

    ## Rate Limits (Ограничения запросов)

    | Эндпоинт | Лимит |
    |----------|-------|
    | Все GET эндпоинты | 60 запросов/мин |
    | Все POST эндпоинты | 30 запросов/мин |

    При превышении лимита возвращается **HTTP 429**.

    ## Формат Ответа Об Ошибке

    Все ошибки возвращаются в формате JSON с полями `code` и `message`:

    ```json
    {
        "code": 5007,
        "message": "missing_token"
    }
    ```

    ## Коды Ошибок

    ### Ошибки Аутентификации и Доступа

    | Код | Статус | Описание |
    |-----|--------|----------|
    | 5006 | 401 | invalid_master_key |
    | 5007 | 401 | missing_token |
    | 5008 | 401 | invalid_token |
    | 5009 | 403 | forbidden |
    | 5010 | 403 | api_version_forbidden |
    | 5011 | 403 | query_param_forbidden |

    ### Ошибки Economy API

    | Код | Статус | Описание |
    |-----|--------|----------|
    | 5016 | 429 | rate_limit_exceeded |
    | 5017 | 500 | internal_error |
    | 5018 | 500 | server_error |

    Базовый URL: `https://api.erlcrussia.xyz/v2`
  version: 2.0.0
servers:
  - url: https://api.erlcrussia.xyz/v2
    description: Production
tags:
  - name: CivOps Economy v2
    description: Эндпоинты для управления экономикой и CivOps системой.
paths:
  /moscowroleplay/civops/economy:
    get:
      tags:
        - CivOps Economy v2
      summary: Получение Данных Экономики
      description: |
        Получение информации о экономики на сервере.

        Доступные действия:
        - `balance` - баланс пользователя (требует userId).
        - `leaderboard` - топ пользователей по балансу (требует limit).
        - `rank` - место в топе пользователя (требует userId).
        - `cooldowns` - кулдауны команд пользователя (требует userId).
      security:
        - MRPAPIKey: []
      parameters:
        - name: action
          in: query
          description: Тип действия для получения данных.
          required: true
          schema:
            type: string
            enum: [balance, leaderboard, rank, cooldowns]
        - name: userId
          in: query
          description: ID пользователя (обязателен для balance, rank, cooldowns).
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: Лимит записей для leaderboard.
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Успешный ответ с данными экономики.
          content:
            application/json:
              schema:
                type: object
              examples:
                balance:
                  summary: Баланс пользователя.
                  value:
                    userId: "1133665013794607114"
                    cash: 500
                    bank: 100000000000
                    rank: 1
                leaderboard:
                  summary: Топ пользователей по балансу.
                  value:
                    count: 10
                    users:
                      - user_id: "1133665013794607114"
                        cash: 500
                        bank: 100000000000
                      - user_id: "924918625129865256"
                        cash: 10
                        bank: 100000000000
                rank:
                  summary: Место пользователя в топе.
                  value:
                    userId: "1133665013794607114"
                    rank: 1
                cooldowns:
                  summary: Кулдауны пользователя.
                  value:
                    userId: "1133665013794607114"
                    cooldowns:
                      - command: "работать"
                        last_used: 1776625200
                        expires_at: 1776627000
        '400':
          description: Ошибка запроса (отсутствует userId для требуемых action или неизвестный action).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedMissingOrInvalidToken'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - CivOps Economy v2
      summary: Операции с Экономикой
      description: |
        Выполнение операций с системой экономики (транзакции, переводы и т.д.).

        Доступные действия:
        - `transfer` - перевод между пользователями (требует fromUserId, toUserId, amount).
        - `deposit` - положить деньги в банк (требует userId, amount).
        - `withdraw` - снять деньги из банка (требует userId, amount).
        - `add` - добавить деньги пользователю (требует userId, amount, type).
        - `remove` - забрать деньги у пользователя (требует userId, amount, type).
        - `reset` - сбросить баланс пользователя (требует userId).
        - `resetCooldown` - сбросить кулдауны пользователя (требует userId, command).

        Параметр type для add/remove может быть 'cash' или 'bank' (по умолчанию 'cash').
      security:
        - MRPAPIKey: []
      parameters:
        - name: action
          in: query
          description: Тип операции.
          required: true
          schema:
            type: string
            enum: [transfer, deposit, withdraw, add, remove, reset, resetCooldown]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            examples:
              transfer:
                summary: Перевод между пользователями.
                value:
                  fromUserId: "1027118272879009886"
                  toUserId: "1133665013794607114"
                  amount: 100000
              deposit:
                summary: Положить деньги в банк.
                value:
                  userId: "1133665013794607114"
                  amount: 50000
              withdraw:
                summary: Вывести деньги из банка.
                value:
                  userId: "1133665013794607114"
                  amount: 20000
              add:
                summary: Добавить деньги.
                value:
                  userId: "1133665013794607114"
                  amount: 5000
                  type: cash
              remove:
                summary: Забрать деньги.
                value:
                  userId: "1133665013794607114"
                  amount: 2000
                  type: bank
              reset:
                summary: Сбросить баланс.
                value:
                  userId: "1133665013794607114"
              resetCooldown:
                summary: Сбросить кулдаун на команду.
                value:
                  userId: "1133665013794607114"
                  command: работать
      responses:
        '200':
          description: Операция успешно выполнена.
          content:
            application/json:
              schema:
                type: object
              examples:
                transfer:
                  summary: Успешный перевод.
                  value:
                    success: true
                    fromUserId: "1027118272879009886"
                    toUserId: "1133665013794607114"
                    amount: 100000
                    newBalance:
                      cash: 104000
                      bank: 10000
                deposit:
                  summary: Успешный депозит.
                  value:
                    success: true
                    userId: "1133665013794607114"
                    deposited: 50000
                    newBank: 150000
                    newCash: 3000
                withdraw:
                  summary: Успешное снятие.
                  value:
                    success: true
                    userId: "1133665013794607114"
                    withdrawn: 50000
                    newBank: 53000
                    newCash: 100000
                add:
                  summary: Деньги добавлены.
                  value:
                    success: true
                    userId: "1133665013794607114"
                    type: cash
                    amount: 5000
                    newBalance:
                      cash: 10000
                      bank: 10000
                remove:
                  summary: Деньги удалены.
                  value:
                    success: true
                    userId: "1133665013794607114"
                    type: bank
                    amount: 2000
                    newBalance:
                      cash: 5000
                      bank: 8000
                reset:
                  summary: Баланс сброшен.
                  value:
                    success: true
                    userId: "1133665013794607114"
                    newBalance:
                      cash: 0
                      bank: 0
                resetCooldown:
                  summary: Кулдаун сброшен.
                  value:
                    success: true
                    userId: "1133665013794607114"
                    command: работать
        '400':
          description: Ошибка запроса (отсутствуют обязательные поля или неизвестный action).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedMissingOrInvalidToken'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /moscowroleplay/civops/users:
    get:
      tags:
        - CivOps Economy v2
      summary: Получение данных пользователей
      description: |
        Получение инвентаря и истории транзакций пользователя.

        Доступные действия:
        - `inventory` - инвентарь пользователя (требует userId).
        - `transactions` - история транзакций (требует userId, page, limit).

      security:
        - MRPAPIKey: []
      parameters:
        - name: action
          in: query
          description: Тип действия для получения данных.
          required: true
          schema:
            type: string
            enum: [inventory, transactions]
        - name: userId
          in: query
          description: ID пользователя (обязателен).
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: Лимит записей для transactions.
          required: false
          schema:
            type: integer
            default: 15
        - name: page
          in: query
          description: Номер страницы для transactions.
          required: false
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Успешный ответ с данными пользователей.
          content:
            application/json:
              schema:
                type: object
              examples:
                inventory:
                  summary: Инвентарь пользователя.
                  value:
                    userId: "1133665013794607114"
                    inventory:
                      - name: "Элитный Класс"
                        amount: 1
                        description: "Получите роль \"Элитный Класс\", чтобы продемонстрировать свое богатство."
                      - name: "Петух"
                        amount: 5
                        description: "Надежный петух, с помощью которого вы можете выиграть (или проиграть) петушиный бой."
                transactions:
                  summary: История покупок у бизнесов.
                  value:
                    userId: "1133665013794607114"
                    page: 1
                    total: 150
                    transactions:
                      - id: 302
                        user_id: "1133665013794607114"
                        business_id: "2TAH37"
                        business_name: "Вкусно и точка"
                        item_name: "Напиток на выбор"
                        item_description: "Напиток на выбор из нескольких позиций: Спрайт, Добрый Кола, Фанта, Вишневая Кола, Липтон Зеленый, Липтон Чёрный"
                        price: 55
                        ts: 1762088809
        '400':
          description: Ошибка запроса (отсутствует userId или неизвестный action).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing_userid:
                  summary: Отсутствует userId.
                  value:
                    error: "userId required"
        '401':
          $ref: '#/components/responses/UnauthorizedMissingOrInvalidToken'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - CivOps Economy v2
      summary: Операции с инвентарём пользователя
      description: |
        Управление инвентарём пользователя.

        Доступные действия:
        - `addItem` - добавить предмет в инвентарь (требует userId, item).
        - `removeItem` - удалить предмет из инвентаря (требует userId, itemName, amount).
        - `clearInventory` - очистить весь инвентарь (требует userId).
      security:
        - MRPAPIKey: []
      parameters:
        - name: action
          in: query
          description: Тип операции.
          required: true
          schema:
            type: string
            enum: [addItem, removeItem, clearInventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            examples:
              addItem:
                summary: Добавить предмет.
                value:
                  userId: "1133665013794607114"
                  item:
                    name: "Петух"
                    amount: 1
                    description: "Надежный петух, с помощью которого вы можете выиграть (или проиграть) петушиный бой."
              removeItem:
                summary: Удалить предмет.
                value:
                  userId: "1133665013794607114"
                  itemName: "Элитный Класс"
                  amount: 1
              clearInventory:
                summary: Очистить инвентарь
                value:
                  userId: "1133665013794607114"
      responses:
        '200':
          description: Операция успешно выполнена.
          content:
            application/json:
              schema:
                type: object
              examples:
                addItem:
                  summary: Предмет добавлен.
                  value:
                    success: true
                    userId: "1133665013794607114"
                    item: "Петух"
                    amount: 1
                removeItem:
                  summary: Предмет удалён.
                  value:
                    success: true
                    userId: "1133665013794607114"
                    item: "Элитный Класс"
                    amount: 1
                clearInventory:
                  summary: Инвентарь очищен.
                  value:
                    success: true
                    userId: "1133665013794607114"
                    action: "inventory_cleared"
        '400':
          description: Ошибка запроса (отсутствуют обязательные поля или неизвестный action).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedMissingOrInvalidToken'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

