        - MRPAPIKey: []
      parameters:
        - name: action
          in: query
          description: Тип операции.
          required: true
          schema:
            type: string
            enum: [addItem, removeItem, buy, sellToStore]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            examples:
