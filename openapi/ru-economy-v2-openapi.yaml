                    item: "Вино \"🍷The Box\""
                    price_buy: 50000
                    price_sell: 0
                    quantity: 1000
                    can_use: false
                    can_sell: false
                buy:
                  summary: Успешная покупка.
                  value:
                    success: true
                    userId: "1133665013794607114"
                    item: "Петух"
                    quantity: 1
                    totalPrice: 2000
                sellToStore:
                  summary: Успешная продажа.
                  value:
                    success: true
                    userId: "1133665013794607114"
                    item: "Вино \"🍷The Box\""
                    quantity: 5
                    totalPrice: 0
        '400':
          description: Ошибка запроса (отсутствуют обязательные поля, товар не найден или неизвестный action).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
