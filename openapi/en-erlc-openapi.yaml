openapi: 3.1.0
info:
  title: Moscow RolePlay API - ER:LC Endpoints
  description: >
    Endpoints for ER:LC server management.


    ## Rate Limits


    | Endpoint | Limit |

    |----------|-------|

    | `/moscowroleplay/erlc/server/*` (except command) | 120 requests/min |

    | `/moscowroleplay/erlc/server/command` | Queue: 100 commands |


    Returns **HTTP 429** when limit is exceeded.


    ## Error Response Format


    All errors are returned in JSON format with `code` and `message` fields:


    ```json

    {

        "code": 5007,

        "message": "missing_token"

    }

    ```


    ## Error Codes


    ### Authentication and Access Errors


    | Code | Status | Description |

    |-----|--------|----------|

    | 5006 | 401 | invalid_master_key |

    | 5007 | 401 | missing_token |

    | 5008 | 401 | invalid_token |

    | 5009 | 403 | forbidden |

    | 5010 | 403 | api_version_forbidden |

    | 5011 | 403 | query_param_forbidden |


    ### PRC API Errors


    Endpoints use external PRC API and may return errors:


    | PRC Code | Description |

    |---------|----------|

    | 2002 | Invalid or expired server-key |

    | 3002 | Server is offline |

    | 4001 | Rate limited |

    | 9999 | Module out of date |


    When PRC API error occurs, returns:


    ```json

    {

        "code": 5019,

        "message": "prc_api_error",

        "prc_code": 2002,

        "prc_message": "Invalid or expired server-key"

    }

    ```


    Base URL: `https://api.erlcrussia.xyz/v1`

  version: 1.0.0
servers:
  - url: https://api.erlcrussia.xyz/v1
    description: Production
tags:
  - name: ERLC
    description: ER:LC game server data and management.
paths:
  /moscowroleplay/erlc/server:
    get:
      tags:
        - ERLC
      summary: ER:LC Server Information
      description: >
        Get general information about ER:LC server (online, name, status, etc.).
      security:
        - MRPAPIKey: []
      responses:
        '200':
          description: Successful response with server information.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerInfo'
        '401':
          $ref: '#/components/responses/UnauthorizedMissingOrInvalidToken'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '400':
          $ref: '#/components/responses/PRCAPIError'
  /moscowroleplay/erlc/server/players:
    get:
      tags:
        - ERLC
      summary: List of Players on Server
      description: |
        Returns current list of players on ER:LC server.
      security:
        - MRPAPIKey: []
      responses:
        '200':
          description: Successful response with player list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Player'
              example:
                - Player: PlayerName:Id
                  Permission: Normal
                  Callsign: Alpha-1
                  Team: Police
                - Player: OfficerName:123456
                  Permission: Server Moderator
                  Team: Police
        '401':
          $ref: '#/components/responses/UnauthorizedMissingOrInvalidToken'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '400':
          $ref: '#/components/responses/PRCAPIError'
  /moscowroleplay/erlc/server/joinlogs:
    get:
      tags:
        - ERLC
      summary: Player Join/Leave Logs
      description: |
        Returns list of player join/leave logs on server.

      security:
        - MRPAPIKey: []
      responses:
        '200':
          description: Join/leave logs.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JoinLog'
              example:
                - Join: true
                  Timestamp: 1704614400
                  Player: PlayerName:Id
                - Join: false
                  Timestamp: 1704614500
                  Player: OfficerName:123456
        '401':
          $ref: '#/components/responses/UnauthorizedMissingOrInvalidToken'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '400':
          $ref: '#/components/responses/PRCAPIError'
  /moscowroleplay/erlc/server/queue:
    get:
      tags:
        - ERLC
      summary: Server Queue
      description: |
        Returns information about ER:LC server queue.
      security:
        - MRPAPIKey: []
      responses:
        '200':
          description: Queue information.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer
                description: Array of player IDs in queue.
                example:
                  - 1
        '401':
          $ref: '#/components/responses/UnauthorizedMissingOrInvalidToken'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '400':
          $ref: '#/components/responses/PRCAPIError'
  /moscowroleplay/erlc/server/killlogs:
    get:
      tags:
        - ERLC
      summary: Kill Logs
      description: |
        Returns kill logs on ER:LC server.
      security:
        - MRPAPIKey: []
      responses:
        '200':
          description: Kill logs.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KillLog'
              example:
                - Killed: PlayerName:Id
                  Timestamp: 1704614400
                  Killer: PlayerName:Id
                - Killed: OfficerName:123456
                  Timestamp: 1704614500
                  Killer: AttackerName:789012
        '401':
          $ref: '#/components/responses/UnauthorizedMissingOrInvalidToken'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '400':
          $ref: '#/components/responses/PRCAPIError'
  /moscowroleplay/erlc/server/commandlogs:
    get:
      tags:
        - ERLC
      summary: Command Logs
      description: |
        Returns logs of executed commands on server.
      security:
        - MRPAPIKey: []
      responses:
        '200':
          description: Command logs.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CommandLog'
              example:
                - Player: PlayerName:Id
                  Timestamp: 1704614400
                  Command: ":h"
                - Player: OfficerName:123456
                  Timestamp: 1704614500
                  Command: ":kick PlayerName"
        '401':
          $ref: '#/components/responses/UnauthorizedMissingOrInvalidToken'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '400':
          $ref: '#/components/responses/PRCAPIError'
  /moscowroleplay/erlc/server/modcalls:
    get:
      tags:
        - ERLC
      summary: Moderator Call Logs
      description: |
        Returns moderator call logs on ER:LC server.
      security:
        - MRPAPIKey: []
      responses:
        '200':
          description: Moderator call logs.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModCallLog'
              example:
                - Caller: PlayerName:Id
                  Moderator: PlayerName:Id
                  Timestamp: 1704614400
        '401':
          $ref: '#/components/responses/UnauthorizedMissingOrInvalidToken'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '400':
          $ref: '#/components/responses/PRCAPIError'
  /moscowroleplay/erlc/server/bans:
    get:
      tags:
        - ERLC
      summary: Server Ban List
      description: |
        Returns list of active bans on ER:LC server.
      security:
        - MRPAPIKey: []
      responses:
        '200':
          description: Ban list.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
                description: Object where key is PlayerId, value is player name.
                example:
                  PlayerId: PlayerName
        '401':
          $ref: '#/components/responses/UnauthorizedMissingOrInvalidToken'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '400':
          $ref: '#/components/responses/PRCAPIError'
  /moscowroleplay/erlc/server/vehicles:
    get:
      tags:
        - ERLC
      summary: List of Vehicles on Server
      description: |
        Returns list of vehicles on ER:LC server.
      security:
        - MRPAPIKey: []
      responses:
        '200':
          description: Vehicle list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Vehicle'
              example:
                - Name: 2024 Falcon Interceptor Utility
                  Owner: Pancakeboyman_8
                  Texture: Standard
        '401':
          $ref: '#/components/responses/UnauthorizedMissingOrInvalidToken'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '400':
          $ref: '#/components/responses/PRCAPIError'
  /moscowroleplay/erlc/server/staff:
    get:
      tags:
        - ERLC
      summary: Server Staff List
      description: |
        Returns list of ER:LC server staff members.
      security:
        - MRPAPIKey: []
      responses:
        '200':
          description: Server staff list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  CoOwners:
                    type: array
                    items:
                      type: integer
                    description: Array of co-owner IDs.
                    example:
                      - 1
                  Admins:
                    type: object
                    additionalProperties:
                      type: string
                    description: Object where key is admin ID, value is name.
                    example:
                      54249787: Black_Hallow
                  Mods:
                    type: object
                    additionalProperties:
                      type: string
                    description: Object where key is moderator ID, value is name.
                    example:
                      2: JohnDoe
              example:
                CoOwners:
                  - 1
                Admins:
                  54249787: Black_Hallow
                  77573259: sli_ckk
                Mods:
                  2: JohnDoe
                  3: JaneDoe
        '401':
          $ref: '#/components/responses/UnauthorizedMissingOrInvalidToken'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '400':
          $ref: '#/components/responses/PRCAPIError'
  /moscowroleplay/erlc/server/command:
    post:
      tags:
        - ERLC
      summary: Send Command to ER:LC Server
      description: >
        Sends a command for execution on ER:LC server.


        Commands are added to global queue with maximum command limit.


        **Note:** This endpoint is **not subject** to Rate Limiting (120 requests/min).
      security:
        - MRPAPIKey: []
      requestBody:
        required: true
        description: Object with Command Text.
        content:
          application/json:
            schema:
              type: object
              required:
                - command
              properties:
                command:
                  type: string
                  example: ':h Test API'
      responses:
        '200':
          description: Command accepted to queue.
          content:
            application/json:
              schema:
                type: object
                properties:
                  Status:
                    type: string
                    description: Command status.
                    example: Queued
                  QueueSize:
                    type: integer
                    description: Current queue size.
                    example: 5
        '400':
          description: Request error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MissingCommandError'
              examples:
                MissingCommand:
                  summary: Command field not provided.
                  value:
                    code: 5005
                    message: MissingCommand
        '401':
          $ref: '#/components/responses/UnauthorizedMissingOrInvalidToken'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          description: Command queue is full.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandQueueFullError'
              examples:
                CommandQueueFull:
                  summary: Command queue is full.
                  value:
                    code: 5015
                    message: CommandQueueFull
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    MRPAPIKey:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: |
        Standard API key for accessing ER:LC endpoints.

        Passed in `Authorization: Bearer <key>` header.

        REQUIRED FOR ALL ER:LC ENDPOINTS.
  responses:
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedMissingOrInvalidToken:
      description: Authentication error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UnauthorizedError'
          examples:
            missing_token:
              summary: No token.
              value:
                code: 5007
                message: missing_token
            invalid_token:
              summary: Invalid or deactivated token.
              value:
                code: 5008
                message: invalid_token
            invalid_master_key:
              summary: Invalid master key.
              value:
                code: 5006
                message: invalid_master_key
    Forbidden:
      description: Access forbidden.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ForbiddenError'
          examples:
            forbidden:
              summary: No access rights to endpoint.
              value:
                code: 5009
                message: forbidden
            api_version_forbidden:
              summary: Access to this API version is forbidden.
              value:
                code: 5010
                message: api_version_forbidden
            query_param_forbidden:
              summary: Query parameter is forbidden.
              value:
                code: 5011
                message: query_param_forbidden
    NotFound:
      description: Not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            discord_id_not_found:
              summary: Discord ID not found.
              value:
                code: 5012
                message: discord_id_not_found
            token_not_found:
              summary: Token not found.
              value:
                code: 5013
                message: token_not_found
    TooManyRequests:
      description: Request limit exceeded (120/min) or spam detected (400+ excess requests).
      headers:
        X-RateLimit-Limit:
          description: Maximum requests per minute.
          schema:
            type: integer
            example: 120
        X-RateLimit-Remaining:
          description: Remaining requests.
          schema:
            type: integer
            example: 0
        X-RateLimit-Reset:
          description: Unix timestamp (ms) when limit resets.
          schema:
            type: integer
            example: 1740339600000
        Retry-After:
          description: Seconds until limit resets.
          schema:
            type: integer
            example: 45
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/RateLimitError'
              - $ref: '#/components/schemas/SpamBlockedError'
          examples:
            rate_limit_exceeded:
              summary: Exceeded 120 requests/min limit.
              value:
                code: 5016
                message: rate_limit_exceeded
                retry_after: 45
                details:
                  limit: 120
                  count: 125
                  excess: 5
                  reset_at: 1740339600000
            spam_blocked:
              summary: Spam ban (400+ excess requests).
              value:
                code: 5023
                message: spam_blocked
                blocked_until: 1740339900000
                remaining_seconds: 300
    PRCAPIError:
      description: Error from external PRC API (ER:LC).
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
                example: 5019
              message:
                type: string
                example: prc_api_error
              prc_code:
                type: integer
                description: PRC API error code.
              prc_message:
                type: string
                description: Error description.
          examples:
            expired_server_key:
              summary: Server-Key invalid or expired.
              value:
                code: 5019
                message: prc_api_error
                prc_code: 2002
                prc_message: Invalid or expired server-key
            server_offline:
              summary: Server offline (no players).
              value:
                code: 5019
                message: prc_api_error
                prc_code: 3002
                prc_message: Server is offline (no players)
            module_outdated:
              summary: Server module is outdated.
              value:
                code: 5019
                message: prc_api_error
                prc_code: 9999
                prc_message: In-game server module is out of date
    InternalServerError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            server_error:
              summary: External ER:LC API error.
              value:
                code: 5018
                message: server_error
    SpamDetectedLevel1:
      description: Suspicious activity (500+ requests/sec). 5 minute ban.
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
                example: 5020
              message:
                type: string
                example: spam_detected_level_1
              blocked_until:
                type: string
                format: date-time
                description: Ban end time.
              remaining_seconds:
                type: integer
                description: Remaining ban time in seconds.
          examples:
            spam_level_1:
              value:
                code: 5020
                message: spam_detected_level_1
                blocked_until: "2026-02-23T12:35:00.000Z"
                remaining_seconds: 300
    SpamDetectedLevel2:
      description: Server attack (5000+ requests/sec). 15 minute ban.
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
                example: 5021
              message:
                type: string
                example: spam_detected_level_2
              blocked_until:
                type: string
                format: date-time
                description: Ban end time.
              remaining_seconds:
                type: integer
                description: Remaining ban time in seconds.
          examples:
            spam_level_2:
              value:
                code: 5021
                message: spam_detected_level_2
                blocked_until: "2026-02-23T12:45:00.000Z"
                remaining_seconds: 900
    SpamDetectedLevel3:
      description: Critical attack (100000+ requests/sec). 60 minute ban.
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
                example: 5022
              message:
                type: string
                example: spam_detected_level_3
              blocked_until:
                type: string
                format: date-time
                description: Ban end time.
              remaining_seconds:
                type: integer
                description: Remaining ban time in seconds.
          examples:
            spam_level_3:
              value:
                code: 5022
                message: spam_detected_level_3
                blocked_until: "2026-02-23T13:30:00.000Z"
                remaining_seconds: 3600
    SpamBlocked:
      description: Active spam ban. Request from blocked client.
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
                example: 5023
              message:
                type: string
                example: spam_blocked
              blocked_until:
                type: string
                format: date-time
                description: Ban end time.
              remaining_seconds:
                type: integer
                description: Remaining ban time in seconds.
          examples:
            spam_blocked:
              value:
                code: 5023
                message: spam_blocked
                blocked_until: "2026-02-23T12:35:00.000Z"
                remaining_seconds: 245
  schemas:
    ErrorResponse:
      type: object
      description: Standard error format.
      required:
        - code
        - message
      properties:
        code:
          type: integer
          description: API error code.
          example: 5007
        message:
          type: string
          description: Error message/identifier.
          example: missing_token
    UnauthorizedError:
      type: object
      description: Authentication error (missing or invalid token).
      required:
        - code
        - message
      properties:
        code:
          type: integer
          example: 5007
        message:
          type: string
          example: missing_token
    ForbiddenError:
      type: object
      description: Access error (forbidden).
      required:
        - code
        - message
      properties:
        code:
          type: integer
          example: 5009
        message:
          type: string
          example: forbidden
    MissingCommandError:
      type: object
      description: Error when command is missing in request.
      required:
        - code
        - message
      properties:
        code:
          type: integer
          example: 5005
        message:
          type: string
          example: MissingCommand
    CommandQueueFullError:
      type: object
      description: Error when command queue is full.
      required:
        - code
        - message
      properties:
        code:
          type: integer
          example: 5015
        message:
          type: string
          example: CommandQueueFull
    RateLimitError:
      type: object
      description: Request limit exceeded error (120/min). Returns details with counter info.
      required:
        - code
        - message
        - retry_after
        - details
      properties:
        code:
          type: integer
          example: 5016
        message:
          type: string
          example: rate_limit_exceeded
        retry_after:
          type: integer
          description: Time until limit resets in seconds.
          example: 45
        details:
          type: object
          properties:
            limit:
              type: integer
              description: Request limit per minute.
              example: 120
            count:
              type: integer
              description: Current request count.
              example: 125
            excess:
              type: integer
              description: Excess requests (over limit).
              example: 5
            reset_at:
              type: integer
              description: Unix timestamp (ms) of limit reset.
              example: 1740339600000
    SpamBlockedError:
      type: object
      description: Spam ban. Issued at 400+ excess requests. 5 minute ban + additional minutes for continued spam.
      required:
        - code
        - message
        - blocked_until
        - remaining_seconds
      properties:
        code:
          type: integer
          example: 5023
        message:
          type: string
          example: spam_blocked
        blocked_until:
          type: integer
          description: Unix timestamp (ms) of ban end.
          example: 1740339900000
        remaining_seconds:
          type: integer
          description: Seconds until unban.
          example: 300
    ServerInfo:
      type: object
      description: General ER:LC server information.
      properties:
        Name:
          type: string
          description: Server name.
          example: API Test
        OwnerId:
          type: integer
          description: Discord ID of server owner.
          example: 1
        CoOwnerIds:
          type: array
          description: Array of co-owner Discord IDs.
          items:
            type: integer
          example:
            - 1
        CurrentPlayers:
          type: integer
          description: Current player count on server.
          example: 1
        MaxPlayers:
          type: integer
          description: Maximum player count.
          example: 1
        JoinKey:
          type: string
          description: Key for joining server.
          example: APIServer
        AccVerifiedReq:
          type: string
          description: Account verification requirement (Disabled/Email/Phone/ID).
          example: Disabled / Email / Phone/ID
        TeamBalance:
          type: boolean
          description: Whether team balance is enabled.
          example: true
      example:
        Name: API Test
        OwnerId: 1
        CoOwnerIds:
          - 1
        CurrentPlayers: 1
        MaxPlayers: 1
        JoinKey: APIServer
        AccVerifiedReq: Disabled / Email / Phone/ID
        TeamBalance: true
    Player:
      type: object
      properties:
        Player:
          type: string
          description: Player name and ID in PlayerName:Id format.
          example: PlayerName:Id
        Permission:
          type: string
          description: Player permission level.
          example: Normal
          enum:
            - Normal
            - Server Administrator
            - Server Owner
            - Server Moderator
        Callsign:
          type: string
          description: Player callsign (only available if player is not in civilian team).
          example: Alpha-1
        Team:
          type: string
          description: Player team.
          example: Police
      example:
        Player: PlayerName:Id
        Permission: Normal
        Callsign: Alpha-1
        Team: Police
    JoinLog:
      type: object
      properties:
        Join:
          type: boolean
          description: true if player joined, false if left.
